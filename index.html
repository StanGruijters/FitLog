<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no"/>
<meta name="theme-color" content="#1A1F36"/>
<meta name="mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-title" content="Fitness Tracker by Stan"/>
<title>Fitness Tracker by Stan</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.19.0/dist/tabler-icons.min.css"/>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"><\/script>
<style>
:root{
  --ac:#FF7900;--acl:#FFF0E0;--acd:#CC6100;
  --bg:#F4F5F7;--sf:#fff;--sf2:#F8F9FA;
  --bd:rgba(0,0,0,.10);--bdm:rgba(0,0,0,.18);
  --tx:#1A1F36;--tx2:#4A5568;--tx3:#718096;
  --ok:#1D9E75;--okl:#E1F5EE;
  --wl:#FFF0E0;--wt:#CC6100;
  --er:#E24B4A;
  --ss:#7C3AED;--ssl:#EDE9FE;
  --rs:8px;--rm:12px;--rl:16px;
  --nav-bg:#1A1F36;--nav-tx:rgba(255,255,255,.65);--nav-tx-on:#fff;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%;overflow:hidden;background:var(--bg);font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;color:var(--tx)}
#app{display:flex;flex-direction:column;height:100%;max-width:480px;margin:0 auto;background:var(--bg)}
.hdr{background:var(--nav-bg);border-bottom:none;padding:env(safe-area-inset-top,0) 16px 0;flex-shrink:0}
.hdr-top{display:flex;align-items:center;justify-content:space-between;padding:14px 0 12px}
.atitle{font-size:16px;font-weight:700;display:flex;align-items:center;gap:8px;color:#fff;letter-spacing:.01em}
.atitle i{color:var(--ac);font-size:20px}
.hdate{font-size:12px;color:rgba(255,255,255,.55)}
nav{display:flex}
.nb{flex:1;padding:10px 4px 12px;background:none;border:none;border-bottom:2.5px solid transparent;font-size:11px;color:var(--nav-tx);cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:3px;font-family:inherit}
.nb i{font-size:20px}
.nb.on{color:var(--nav-tx-on);border-bottom-color:var(--ac);font-weight:700}
.pages{flex:1;overflow:hidden;position:relative}
.page{position:absolute;top:0;left:0;right:0;bottom:0;overflow-y:auto;padding:16px;display:none}
.page.on{display:block}
.stitle{font-size:11px;font-weight:700;color:var(--tx3);text-transform:uppercase;letter-spacing:.07em;margin-bottom:10px}
.mtabs{display:flex;gap:6px;overflow-x:auto;padding-bottom:10px;margin-bottom:14px;scrollbar-width:none}
.mtabs::-webkit-scrollbar{display:none}
.mt{padding:6px 14px;border-radius:20px;border:.5px solid var(--bdm);background:var(--sf);font-size:12px;color:var(--tx2);cursor:pointer;white-space:nowrap;font-family:inherit}
.mt.on{background:var(--ac);color:#fff;border-color:var(--ac);font-weight:600}
.card{background:var(--sf);border:.5px solid var(--bd);border-radius:var(--rl);padding:12px 14px;margin-bottom:8px}
.ibt{width:34px;height:34px;border-radius:50%;border:.5px solid var(--bdm);background:none;cursor:pointer;display:flex;align-items:center;justify-content:center;color:var(--tx2);font-size:20px;flex-shrink:0}
.ibt.on{background:var(--ac);border-color:var(--ac);color:#fff}
.rblock{background:var(--sf);border:.5px solid var(--bd);border-radius:var(--rl);padding:12px 14px;margin-bottom:10px}
.ssblock{background:var(--sf);border:1.5px solid var(--ss);border-radius:var(--rl);padding:12px 14px;margin-bottom:10px}
.sslbl{display:inline-flex;align-items:center;gap:4px;font-size:11px;font-weight:700;color:var(--ss);background:var(--ssl);padding:3px 8px;border-radius:10px;margin-bottom:8px}
.sinput{height:34px;border:.5px solid var(--bdm);border-radius:var(--rs);background:var(--sf2);color:var(--tx);font-size:13px;text-align:center;padding:0 4px;font-family:inherit;width:100%}
.dvd{height:.5px;background:var(--bd);margin:10px 0}
.empty{text-align:center;padding:40px 20px;color:var(--tx3)}
.empty i{font-size:40px;display:block;margin-bottom:10px;opacity:.35}
.empty p{font-size:14px;line-height:1.5}
.btn{width:100%;padding:13px;background:var(--ac);color:#fff;border:none;border-radius:var(--rm);font-size:15px;font-weight:600;cursor:pointer;font-family:inherit;display:flex;align-items:center;justify-content:center;gap:6px}
.btnO{width:100%;padding:11px;background:none;color:var(--ac);border:1.5px solid var(--ac);border-radius:var(--rm);font-size:14px;font-weight:600;cursor:pointer;font-family:inherit;display:flex;align-items:center;justify-content:center;gap:6px;margin-top:8px}
.btnSS{width:100%;padding:10px;background:var(--ssl);color:var(--ss);border:1.5px solid var(--ss);border-radius:var(--rm);font-size:14px;font-weight:600;cursor:pointer;font-family:inherit;display:flex;align-items:center;justify-content:center;gap:6px}
.pk-ex-row{padding:12px 14px;border-bottom:.5px solid var(--bd);cursor:pointer;display:flex;justify-content:space-between;align-items:center}
.pk-ex-row:last-child{border-bottom:none}
.pk-ex-row:active{background:var(--sf2)}
.pk-confirm{background:var(--sf);border-radius:var(--rl) var(--rl) 0 0;padding:20px 16px 32px;width:100%}
.pk-confirm-name{font-size:17px;font-weight:700;margin-bottom:4px}
.pk-confirm-meta{font-size:13px;color:var(--tx3);margin-bottom:20px}
.pk-btn-solo{width:100%;padding:13px;background:var(--ac);color:#fff;border:none;border-radius:var(--rm);font-size:15px;font-weight:600;cursor:pointer;font-family:inherit;display:flex;align-items:center;justify-content:center;gap:8px;margin-bottom:10px}
.pk-btn-ss{width:100%;padding:13px;background:var(--ssl);color:var(--ss);border:1.5px solid var(--ss);border-radius:var(--rm);font-size:15px;font-weight:600;cursor:pointer;font-family:inherit;display:flex;align-items:center;justify-content:center;gap:8px;margin-bottom:10px}
.pk-btn-cancel{width:100%;padding:11px;background:none;color:var(--tx3);border:.5px solid var(--bdm);border-radius:var(--rm);font-size:14px;cursor:pointer;font-family:inherit}
.ss-pair-search{width:100%;height:40px;border:.5px solid var(--bdm);border-radius:var(--rm);background:var(--sf2);color:var(--tx);font-size:14px;padding:0 12px;font-family:inherit;margin-bottom:8px}
.ss-pair-list{max-height:40vh;overflow-y:auto;border:.5px solid var(--bd);border-radius:var(--rm);margin-bottom:14px}
.ss-pair-item{padding:10px 14px;border-bottom:.5px solid var(--bd);cursor:pointer;display:flex;justify-content:space-between;align-items:center}
.ss-pair-item:last-child{border-bottom:none}
.ss-pair-item:active{background:var(--sf2)}
.btnD{padding:7px 12px;background:none;color:var(--er);border:.5px solid var(--er);border-radius:20px;font-size:12px;cursor:pointer;font-family:inherit}
.sstats{display:flex;gap:14px;margin-top:6px;flex-wrap:wrap}
.sp{font-size:12px;color:var(--tx3);display:flex;align-items:center;gap:4px}
.sp i{font-size:14px}
.prow{display:flex;align-items:center;gap:8px;margin-bottom:6px}
.pdate{font-size:11px;color:var(--tx3);width:52px;flex-shrink:0}
.pbw{flex:1;height:6px;background:var(--sf2);border-radius:3px;overflow:hidden}
.pb{height:100%;background:var(--ac);border-radius:3px}
.pval{font-size:12px;font-weight:600;width:48px;text-align:right}
.pdelta{display:inline-flex;align-items:center;gap:3px;font-size:11px;padding:2px 8px;border-radius:8px;font-weight:600}
.pdelta.up{background:var(--okl);color:var(--ok)}
.pdelta.dn{background:#FEE2E2;color:#B91C1C}
.prbadge{display:inline-flex;align-items:center;gap:3px;font-size:11px;padding:2px 8px;border-radius:10px;background:var(--wl);color:var(--wt);font-weight:600;margin-left:6px}
.mbg{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.45);z-index:50;display:none;align-items:flex-end}
.mbg.on{display:flex}
#m-cfg{z-index:90}
.modal{background:var(--sf);border-radius:var(--rl) var(--rl) 0 0;padding:20px 16px 32px;width:100%;max-height:88vh;overflow-y:auto}
.mtitle{font-size:17px;font-weight:700;margin-bottom:14px}
.ifield{width:100%;height:42px;border:.5px solid var(--bdm);border-radius:var(--rm);background:var(--sf2);color:var(--tx);font-size:15px;padding:0 12px;font-family:inherit;margin-bottom:12px}
.tfield{width:100%;border:.5px solid var(--bdm);border-radius:var(--rm);background:var(--sf2);color:var(--tx);font-size:14px;padding:10px 12px;font-family:inherit;margin-bottom:12px;min-height:80px;resize:vertical}
.sfield{width:100%;height:42px;border:.5px solid var(--bdm);border-radius:var(--rm);background:var(--sf2);color:var(--tx);font-size:15px;padding:0 12px;font-family:inherit;margin-bottom:12px;-webkit-appearance:none;appearance:none}
.mact{display:flex;gap:8px;margin-top:4px}
.mact button{flex:1;margin:0}
.flbl{font-size:12px;color:var(--tx3);font-weight:600;margin-bottom:6px;display:block}
.fs{position:fixed;top:0;left:0;right:0;bottom:0;background:var(--bg);z-index:80;display:none;flex-direction:column}
.fs.on{display:flex}
.fsh{background:var(--nav-bg);border-bottom:none;padding:calc(env(safe-area-inset-top,0) + 14px) 16px 14px;display:flex;align-items:center;gap:10px;flex-shrink:0;color:#fff}
.fstitle{flex:1;font-size:17px;font-weight:700;color:#fff}
.fsb{flex:1;overflow-y:auto;padding:16px}
.fsf{padding:12px 16px 20px;background:var(--sf);border-top:.5px solid var(--bd);flex-shrink:0}
/* Builder layout */
.bld{display:flex;flex-direction:column;height:100%}
.bld-top{flex-shrink:0;background:var(--sf);border-bottom:.5px solid var(--bd);padding:12px 16px}
.bld-list{flex:1;overflow-y:auto;padding:0 0 8px}
.bld-panel{flex-shrink:0;background:var(--sf);border-top:2px solid var(--ac);height:46vh;display:flex;flex-direction:column}
.bld-panel-hdr{padding:10px 16px;display:flex;align-items:center;justify-content:space-between;border-bottom:.5px solid var(--bd);flex-shrink:0}
.bld-panel-body{overflow-y:auto;padding:10px 16px}
.bld-ex{padding:11px 16px;border-bottom:.5px solid var(--bd);display:flex;align-items:center;gap:10px;cursor:pointer}
.bld-ex:last-child{border-bottom:none}
.bld-ex:active{background:var(--sf2)}
.bld-ex.added{background:var(--acl)}
.bld-block{background:var(--sf2);border-radius:var(--rm);padding:10px 12px;margin-bottom:8px;border:.5px solid var(--bd)}
.bld-block.ss{border-color:var(--ss);background:var(--ssl)}
.bld-block-row{display:flex;align-items:center;justify-content:space-between;margin-bottom:6px}
.bld-block-name{font-size:13px;font-weight:600;flex:1}
.bld-rmv{background:none;border:none;cursor:pointer;color:var(--tx3);font-size:16px;padding:2px 4px;line-height:1}
.stepper{display:flex;align-items:center;gap:8px}
.stpbtn{width:26px;height:26px;border-radius:50%;border:.5px solid var(--bdm);background:var(--sf);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:16px;color:var(--ac)}
.stpval{font-size:14px;font-weight:700;min-width:20px;text-align:center}
.cfg-row{display:grid;grid-template-columns:1fr 10px 1fr;gap:8px;margin-bottom:8px}
.cfg-inp{height:32px;border:.5px solid var(--bdm);border-radius:var(--rs);background:var(--sf);color:var(--tx);font-size:13px;text-align:center;font-family:inherit;width:100%}
.cfg-lbl{font-size:10px;color:var(--tx3);text-align:center;font-weight:700;text-transform:uppercase;margin-bottom:3px}
.bsearch{width:100%;height:38px;border:.5px solid var(--bdm);border-radius:var(--rm);background:var(--sf2);color:var(--tx);font-size:14px;padding:0 12px;font-family:inherit;margin-bottom:10px}
.mdiag{background:var(--sf2);border-radius:var(--rl);padding:12px;margin-bottom:12px;display:flex;gap:16px;justify-content:center;align-items:flex-start}
.mfig{flex:1;text-align:center;max-width:140px}
.mfig svg{width:100%;height:auto;display:block}
.mfig p{font-size:11px;color:var(--tx3);margin-top:4px;font-weight:600;text-transform:uppercase;letter-spacing:.04em}
.mleg{display:flex;gap:10px;justify-content:center;margin-top:8px}
.mldot{width:10px;height:10px;border-radius:50%;flex-shrink:0}
.icard{background:var(--sf);border-radius:var(--rl);padding:14px;margin-bottom:10px}
.icard h3{font-size:12px;font-weight:700;color:var(--tx3);text-transform:uppercase;letter-spacing:.05em;margin-bottom:8px}
.srow{display:flex;gap:10px;margin-bottom:8px;font-size:14px;line-height:1.55}
.snum{width:22px;height:22px;border-radius:50%;background:var(--acl);color:var(--acd);font-size:11px;font-weight:700;display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-top:1px}
.trow{display:flex;gap:8px;margin-bottom:6px;font-size:13px;color:var(--tx2);line-height:1.5}
.trow i{color:var(--ac);font-size:16px;flex-shrink:0;margin-top:1px}
.ytbtn{display:flex;align-items:center;gap:8px;width:100%;padding:12px 14px;background:#FF0000;color:#fff;border:none;border-radius:var(--rm);font-size:14px;font-weight:600;cursor:pointer;font-family:inherit;margin-top:4px}
.tchip{background:var(--acl);color:var(--acd);font-size:13px;font-weight:700;padding:4px 12px;border-radius:20px;font-variant-numeric:tabular-nums}
.cbtn{width:34px;height:34px;border-radius:50%;border:.5px solid var(--bdm);background:none;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:18px;color:var(--tx3);flex-shrink:0}
.cbtn.on{background:var(--ok);border-color:var(--ok);color:#fff}
.linput{height:36px;border:.5px solid var(--bdm);border-radius:var(--rs);background:var(--sf2);color:var(--tx);font-size:14px;text-align:center;font-family:inherit;width:100%}
.lrow{display:grid;grid-template-columns:24px 1fr 8px 1fr 8px 34px;gap:6px;align-items:center;margin-bottom:6px}
#toast{position:fixed;bottom:80px;left:50%;transform:translateX(-50%) translateY(16px);background:#111;color:#fff;padding:10px 20px;border-radius:20px;font-size:13px;font-weight:500;opacity:0;transition:all .25s;z-index:300;white-space:nowrap;pointer-events:none}
#toast.on{opacity:1;transform:translateX(-50%) translateY(0)}
.fsh .ibt{border-color:rgba(255,255,255,.25);color:rgba(255,255,255,.8)}
.fsh .ibt:active{background:rgba(255,255,255,.1)}
.fsh input.ifield{background:rgba(255,255,255,.12);border-color:rgba(255,255,255,.2);color:#fff}
.fsh input.ifield::placeholder{color:rgba(255,255,255,.4)}
.fsh .tchip{background:rgba(255,255,255,.15);color:#fff}
.fab{position:fixed;bottom:76px;right:20px;width:52px;height:52px;border-radius:50%;background:var(--ac);color:#fff;border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:26px;box-shadow:0 4px 16px rgba(24,95,165,.35);z-index:40}
.spbtn{width:30px;height:30px;border-radius:50%;border:.5px solid var(--bdm);background:none;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:18px;color:var(--ac)}
.spval{font-size:15px;font-weight:700;min-width:24px;text-align:center}
.pbhint{display:inline-flex;align-items:center;gap:4px;font-size:11px;color:var(--ac);background:var(--acl);padding:2px 8px;border-radius:8px}
.ssearch{width:100%;height:38px;border:.5px solid var(--bdm);border-radius:var(--rm);background:var(--sf2);color:var(--tx);font-size:14px;padding:0 12px;font-family:inherit;margin-bottom:6px}
.sslist{max-height:35vh;overflow-y:auto;border:.5px solid var(--bd);border-radius:var(--rm);margin-bottom:10px}
.ssitem{padding:9px 12px;border-bottom:.5px solid var(--bd);cursor:pointer;display:flex;justify-content:space-between;align-items:center}
.ssitem:last-child{border-bottom:none}
.fb{display:flex;align-items:center;justify-content:space-between}
.gap8{gap:8px}
</style>
</head>
<body>
<!-- ═══ LOGIN SCREEN ═══════════════════════════════════════ -->
<div id="login-screen" style="display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;padding:32px 24px;background:var(--nav-bg)">
  <div style="width:100%;max-width:360px">
    <!-- Logo -->
    <div style="text-align:center;margin-bottom:40px">
      <i class="ti ti-barbell" style="font-size:48px;color:var(--ac)"></i>
      <div style="font-size:22px;font-weight:700;color:#fff;margin-top:8px">Fitness Tracker</div>
      <div style="font-size:13px;color:rgba(255,255,255,.5);margin-top:4px">by Stan</div>
    </div>
    <!-- Tab switcher -->
    <div style="display:flex;background:rgba(255,255,255,.08);border-radius:var(--rm);padding:3px;margin-bottom:24px">
      <button id="tab-signin" onclick="switchTab('signin')" style="flex:1;padding:8px;border:none;border-radius:var(--rs);background:var(--ac);color:#fff;font-weight:600;font-size:14px;cursor:pointer;font-family:inherit">Sign in</button>
      <button id="tab-signup" onclick="switchTab('signup')" style="flex:1;padding:8px;border:none;border-radius:var(--rs);background:transparent;color:rgba(255,255,255,.6);font-weight:600;font-size:14px;cursor:pointer;font-family:inherit">Sign up</button>
    </div>
    <!-- Form -->
    <div id="auth-error" style="display:none;background:rgba(226,75,74,.2);border:1px solid var(--er);color:#FFB3B3;padding:10px 12px;border-radius:var(--rs);font-size:13px;margin-bottom:14px"></div>
    <input id="auth-email" type="email" placeholder="Email address" style="width:100%;height:46px;border:1px solid rgba(255,255,255,.15);border-radius:var(--rm);background:rgba(255,255,255,.08);color:#fff;font-size:15px;padding:0 14px;font-family:inherit;margin-bottom:12px"/>
    <input id="auth-password" type="password" placeholder="Password" style="width:100%;height:46px;border:1px solid rgba(255,255,255,.15);border-radius:var(--rm);background:rgba(255,255,255,.08);color:#fff;font-size:15px;padding:0 14px;font-family:inherit;margin-bottom:16px"/>
    <button id="auth-submit" onclick="submitAuth()" style="width:100%;padding:13px;background:var(--ac);color:#fff;border:none;border-radius:var(--rm);font-size:15px;font-weight:700;cursor:pointer;font-family:inherit;margin-bottom:16px">Sign in</button>
    <!-- Divider -->
    <div style="display:flex;align-items:center;gap:10px;margin-bottom:16px">
      <div style="flex:1;height:.5px;background:rgba(255,255,255,.15)"></div>
      <span style="font-size:12px;color:rgba(255,255,255,.4)">or continue with</span>
      <div style="flex:1;height:.5px;background:rgba(255,255,255,.15)"></div>
    </div>
    <!-- Google login -->
    <button onclick="signInGoogle()" style="width:100%;padding:12px;background:#fff;color:#1A1F36;border:none;border-radius:var(--rm);font-size:14px;font-weight:600;cursor:pointer;font-family:inherit;display:flex;align-items:center;justify-content:center;gap:10px">
      <svg width="18" height="18" viewBox="0 0 48 48"><path fill="#4285F4" d="M47.5 24.6c0-1.6-.1-3.1-.4-4.6H24v8.7h13.2c-.6 3-2.3 5.5-4.9 7.2v6h7.9c4.6-4.2 7.3-10.5 7.3-17.3z"/><path fill="#34A853" d="M24 48c6.5 0 12-2.2 16-5.9l-7.9-6c-2.2 1.5-5 2.3-8.1 2.3-6.2 0-11.5-4.2-13.4-9.9H2.5v6.2C6.5 42.6 14.7 48 24 48z"/><path fill="#FBBC05" d="M10.6 28.5c-.5-1.5-.8-3-.8-4.5s.3-3.1.8-4.5v-6.2H2.5C.9 16.6 0 20.2 0 24s.9 7.4 2.5 10.7l8.1-6.2z"/><path fill="#EA4335" d="M24 9.5c3.5 0 6.6 1.2 9.1 3.5l6.8-6.8C35.9 2.2 30.5 0 24 0 14.7 0 6.5 5.4 2.5 13.3l8.1 6.2C12.5 13.7 17.8 9.5 24 9.5z"/></svg>
      Continue with Google
    </button>
    <div id="auth-msg" style="display:none;text-align:center;font-size:13px;color:rgba(255,255,255,.6);margin-top:16px"></div>
  </div>
</div>

<div id="app">
  <div class="hdr">
    <div class="hdr-top">
      <div class="atitle"><i class="ti ti-barbell"></i>Fitness Tracker by Stan</div>
      <div style="display:flex;align-items:center;gap:10px">
        <span class="hdate" id="hdate"></span>
        <button onclick="signOut()" title="Sign out" style="background:none;border:none;cursor:pointer;color:rgba(255,255,255,.5);font-size:18px;padding:2px;display:flex;align-items:center"><i class="ti ti-logout"></i></button>
      </div>
    </div>
    <nav>
      <button class="nb on" id="nb-lib" onclick="SP('lib')"><i class="ti ti-books"></i>Library</button>
      <button class="nb" id="nb-rtn" onclick="SP('rtn')"><i class="ti ti-list-check"></i>Routine</button>

<script>
// Exercise data as JSON string to avoid ALL string-literal JS issues
var EX_JSON = '["bp|Bench press|Chest|Barbell|Lie flat on a bench grip the bar slightly wider than shoulder-width~Unrack the bar and hold it directly above your chest with arms fully extended~Lower the bar slowly to your mid-chest keeping elbows at about 45 degrees~Press the bar back up to the starting position exhaling on the way up|Keep your feet flat on the floor and back slightly arched~Do not bounce the bar off your chest~Keep wrists straight throughout|Pectoralis major|Triceps,Front deltoid|bench press form tutorial","idb|Incline dumbbell press|Chest|Dumbbell|Set bench to 30-45 degrees. Sit back holding dumbbells at chest height~Press the dumbbells up and slightly inward until arms are extended~Lower slowly back to chest height with control|Keep lower back in contact with the bench~Focus on squeezing the upper chest at the top|Upper pectoralis|Triceps,Front deltoid|incline dumbbell press tutorial","pec|Pec deck fly|Chest|Machine|Sit with back flat against the pad. Grip handles at chest height~Bring handles together in a wide arc until they meet in front of your chest~Slowly return to start feeling the stretch in your chest|Avoid locking your elbows~Move slowly on the way back for maximum stretch|Pectoralis major|Front deltoid|pec deck fly tutorial","cbf|Cable fly|Chest|Cable|Set cables to shoulder height. Stand in the center gripping a handle in each hand~Step forward lean slightly forward and bring your hands together in an arc~Slowly return to the starting position with control|Maintain slight elbow bend throughout~Imagine hugging a large barrel|Pectoralis major|Front deltoid|cable chest fly tutorial","dip|Dip|Chest|Bodyweight|Grip parallel bars and support yourself with arms extended~Lean slightly forward then lower yourself by bending your elbows to about 90 degrees~Push back up to the starting position|Leaning forward targets chest staying upright targets triceps~Keep elbows pointing backward|Pectoralis major|Triceps,Front deltoid|dip exercise chest form","dl|Deadlift|Back|Barbell|Stand with feet hip-width apart bar over mid-foot~Hinge at hips bend knees and grip bar just outside your legs~Drive through the floor keeping chest up and back flat until you stand tall~Lower the bar back to the floor with control|Keep the bar close to your body throughout~Never round your lower back under load|Erector spinae,Glutes|Hamstrings,Traps,Lats|deadlift form tutorial","row|Barbell row|Back|Barbell|Hinge forward to about 45 degrees gripping bar shoulder-width overhand~Pull bar toward your lower chest leading with your elbows~Lower bar back down with control|Keep your back flat~Squeeze your shoulder blades together at the top|Latissimus dorsi,Rhomboids|Biceps,Rear deltoid|barbell row form tutorial","lat|Lat pulldown|Back|Cable|Grip the bar wider than shoulder-width and sit with thighs secured under pads~Pull the bar down to your upper chest leading with elbows~Slowly return to the starting position with arms fully extended|Lean back slightly as you pull~Avoid shrugging your shoulders|Latissimus dorsi|Biceps,Rear deltoid|lat pulldown form tutorial","pu|Pull-up|Back|Bodyweight|Hang from a bar with an overhand grip slightly wider than shoulders~Pull yourself up until your chin clears the bar~Lower yourself slowly back to a dead hang|Initiate the pull by depressing your shoulder blades~Avoid swinging for strict form|Latissimus dorsi|Biceps,Rear deltoid|pull up proper form tutorial","scr|Seated cable row|Back|Cable|Sit facing the cable machine feet on platform knees slightly bent~Pull the handle to your abdomen squeezing your shoulder blades together~Slowly return to the starting position until arms are fully extended|Avoid rounding your lower back as you reach forward~Lead with elbows not hands|Rhomboids,Latissimus dorsi|Biceps|seated cable row tutorial","sq|Squat|Legs|Barbell|Place the bar on your upper traps. Stand with feet shoulder-width apart toes out slightly~Brace your core push your hips back and bend your knees to descend~Lower until thighs are parallel to the floor~Drive through your heels to stand back up|Keep your chest up and knees tracking over your toes~Do not let your heels come off the ground|Quadriceps,Glutes|Hamstrings,Core,Erector spinae|squat form tutorial barbell","lp|Leg press|Legs|Machine|Sit in the machine with feet shoulder-width on the platform~Release the safety locks and lower the platform by bending your knees~Press back up until legs are nearly straight|Do not let your lower back peel off the seat~High feet targets glutes and hamstrings low feet targets quads|Quadriceps,Glutes|Hamstrings|leg press form tutorial","rdl|Romanian deadlift|Legs|Barbell|Stand holding bar at hip level with overhand grip~Push hips back and lower bar down your legs keeping back flat~Feel a deep stretch in your hamstrings then drive hips forward to return upright|Keep the bar in contact with your legs throughout~Think hinge not squat|Hamstrings,Glutes|Erector spinae|romanian deadlift form tutorial","lc|Leg curl|Legs|Machine|Lie face-down on the machine with the pad just above your heels~Curl your legs up toward your glutes as far as possible~Lower slowly back to the starting position|Avoid raising your hips off the bench~Control the lowering phase|Hamstrings|Calves|lying leg curl tutorial","le|Leg extension|Legs|Machine|Sit in the machine with the pad on your lower shins~Extend both legs until they are straight squeezing your quads at the top~Lower slowly back to starting position|Do not use momentum~Keep your back flat against the seat|Quadriceps||leg extension machine tutorial","crf|Calf raise|Legs|Machine|Place shoulders under the pads feet on the platform with heels hanging off~Rise onto your toes as high as possible~Lower heels below the platform level for a full stretch|Pause at the top and bottom for maximum effect~Keep knees slightly soft|Gastrocnemius,Soleus||standing calf raise tutorial","lng|Lunge|Legs|Bodyweight|Stand tall feet together~Step one foot forward and lower your back knee toward the floor~Push through your front foot to return to standing|Keep your front knee behind your toes~Maintain an upright torso|Quadriceps,Glutes|Hamstrings,Calves|lunge exercise proper form","ohp|Overhead press|Shoulders|Barbell|Stand with feet shoulder-width bar resting on front deltoids with overhand grip~Press bar directly overhead until arms are locked out~Lower slowly back to the starting position|Keep your core braced and glutes squeezed~Move your head slightly back to let the bar pass|Front deltoid,Medial deltoid|Triceps,Traps,Core|overhead press form tutorial","lr|Lateral raise|Shoulders|Dumbbell|Stand holding dumbbells at your sides~Raise both arms out to the sides until they are level with your shoulders~Lower slowly back to your sides|Tilt dumbbells slightly forward to target the medial deltoid~Avoid shrugging|Medial deltoid|Traps|lateral raise dumbbell tutorial","fr|Front raise|Shoulders|Dumbbell|Stand holding dumbbells in front of your thighs palms facing down~Raise both arms forward to shoulder height~Lower with control|Keep a slight bend in your elbows~Avoid using momentum|Front deltoid|Medial deltoid|front raise shoulder tutorial","rdf|Rear delt fly|Shoulders|Dumbbell|Hinge forward at the hips holding dumbbells with a neutral grip~Raise both arms out to the sides in a wide arc leading with your elbows~Lower slowly back to starting position|Keep a slight bend in the elbows throughout~Focus on squeezing your rear delts|Rear deltoid|Rhomboids,Traps|rear delt fly dumbbell tutorial","fpl|Face pull|Shoulders|Cable|Set cable to upper chest height with rope attachment~Pull the rope toward your face flaring your elbows out to the sides~Hold briefly at full contraction then return slowly|External rotate at the top - thumbs point backward~Great for shoulder health and rear delt development|Rear deltoid|External rotators,Traps|face pull exercise tutorial","bc|Barbell curl|Biceps|Barbell|Stand holding a barbell with underhand grip hands shoulder-width apart~Curl the bar up toward your shoulders keeping elbows at your sides~Lower slowly back to the starting position|Avoid swinging~Squeeze your biceps hard at the top|Biceps brachii|Brachialis,Brachioradialis|barbell curl form tutorial","hc|Hammer curl|Biceps|Dumbbell|Stand holding dumbbells with a neutral (palms-in) grip~Curl both dumbbells up simultaneously keeping neutral grip throughout~Lower slowly back to starting position|The neutral grip shifts emphasis to the brachialis and forearms~Keep your upper arms stationary|Brachialis|Biceps brachii,Brachioradialis|hammer curl tutorial","cc|Cable curl|Biceps|Cable|Stand in front of a low cable with a straight or EZ bar attachment~Curl the handle up toward your chin keeping elbows at your sides~Lower with control|Cables provide constant tension great for muscle growth~Squeeze at the top and resist on the way down|Biceps brachii|Brachialis|cable curl biceps tutorial","idc|Incline dumbbell curl|Biceps|Dumbbell|Sit on an incline bench holding dumbbells at arm length~Curl both dumbbells up toward your shoulders without moving your upper arms~Lower slowly|The incline position stretches the long head of the biceps for a fuller peak~Do not swing or use momentum|Biceps brachii long head|Brachialis|incline dumbbell curl tutorial","tpd|Tricep pushdown|Triceps|Cable|Set cable to high position with a straight or V-bar attachment~Keep elbows at your sides and push the bar down until arms are fully extended~Allow the bar to rise back up slowly|Keep your elbows locked at your sides~Flex your triceps hard at full extension|Triceps brachii||tricep pushdown cable tutorial","skc|Skull crusher|Triceps|Barbell|Lie on a bench holding an EZ-bar above your chest with an overhand grip~Lower the bar toward your forehead by bending your elbows~Extend your arms back to the starting position|Keep your upper arms vertical and stationary~Use controlled motion|Triceps brachii||skull crusher tricep tutorial","tkb|Tricep kickback|Triceps|Dumbbell|Hinge forward upper arm parallel to the floor holding a dumbbell~Extend your forearm back until your arm is fully straightened~Lower slowly back to 90 degrees|Keep your upper arm still~Squeeze the tricep hard at full extension|Triceps brachii||tricep kickback dumbbell tutorial","ote|Overhead tricep ext.|Triceps|Dumbbell|Hold one dumbbell with both hands overhead arms extended~Lower the dumbbell behind your head by bending at the elbows~Press back up to the starting position|Keep elbows close together and pointed forward~Great for stretching the long head of the triceps|Triceps brachii long head||overhead tricep extension tutorial","cr|Crunch|Core|Bodyweight|Lie on your back knees bent hands behind your head~Lift your shoulder blades off the floor by contracting your abs~Lower back down with control|Do not pull on your neck~Exhale as you crunch up|Rectus abdominis|Obliques|crunch ab exercise proper form","pl|Plank|Core|Bodyweight|Support yourself on forearms and toes body in a straight line~Hold the position keeping hips level~Breathe normally throughout|Squeeze your glutes and core simultaneously~Avoid looking up keep a neutral neck|Transverse abdominis,Rectus abdominis|Glutes,Shoulders|plank exercise proper form","lgr|Leg raise|Core|Bodyweight|Lie flat on your back arms at your sides~Keeping legs straight raise them to 90 degrees above the floor~Lower slowly without letting feet touch the ground|Press your lower back into the floor~Slow the descent for extra difficulty|Lower rectus abdominis,Hip flexors||leg raise abs tutorial","rut|Russian twist|Core|Bodyweight|Sit with knees bent feet off the floor torso leaning slightly back~Hold hands together and rotate your torso side to side~Touch the floor beside each hip with your hands|Add a weight for extra challenge~Keep your core braced throughout|Obliques|Rectus abdominis|russian twist core exercise","bic|Bicycle crunch|Core|Bodyweight|Lie on your back hands behind head legs lifted with knees bent at 90 degrees~Bring your right elbow to your left knee while extending the right leg~Alternate sides in a pedaling motion|Move slowly and deliberately~Focus on rotating your torso not just your elbow|Obliques,Rectus abdominis||bicycle crunch tutorial","mnt|Mountain climber|Core|Bodyweight|Start in a high plank position arms straight~Drive one knee toward your chest then switch legs in a running motion~Keep hips level and core engaged|The faster you go the more cardio benefit. Slower means more core~Keep shoulders over wrists|Rectus abdominis,Hip flexors|Shoulders,Obliques|mountain climber exercise tutorial","hth|Hip thrust|Core|Barbell|Sit with upper back against a bench bar over your hips~Drive hips up until your torso is parallel to the floor~Squeeze glutes hard at the top then lower|Place a pad between you and the bar for comfort~Also excellent for glute development|Glutes,Transverse abdominis|Hamstrings|hip thrust tutorial","abw|Ab wheel rollout|Core|Ab wheel|Kneel on the floor holding an ab wheel with both hands~Roll the wheel forward extending your body as far as you can while keeping your back flat~Pull the wheel back to your knees using your abs|Start with short range of motion and progress over time~Avoid letting your lower back sag|Rectus abdominis,Transverse abdominis|Lats,Shoulders|ab wheel rollout tutorial","spl|Side plank|Core|Bodyweight|Lie on your side and prop yourself up on one forearm~Lift your hips so your body forms a straight line from head to feet~Hold the position then repeat on the other side|Stack your feet or stagger them for balance~Keep your neck neutral|Obliques|Glutes,Shoulder stabilizers|side plank exercise tutorial","vup|V-up|Core|Bodyweight|Lie flat arms overhead~Simultaneously lift your legs and torso toward each other reaching hands toward feet~Lower back down with control|Keep both legs straight for maximum difficulty~Exhale as you crunch up|Rectus abdominis,Hip flexors||v up exercise tutorial","dbd|Dead bug|Core|Bodyweight|Lie on your back arms pointing to the ceiling knees bent 90 degrees in the air~Lower your right arm and left leg toward the floor simultaneously~Return to start and repeat on the opposite side|Press your lower back firmly into the floor throughout~Move slowly and with control|Transverse abdominis,Rectus abdominis|Hip flexors|dead bug exercise tutorial","hkr|Hanging knee raise|Core|Bodyweight|Hang from a pull-up bar with arms fully extended~Draw your knees up toward your chest by contracting your abs~Lower back to dead hang with control|Avoid swinging. Initiate the movement with your abs~Progress to straight leg raises over time|Lower rectus abdominis|Hip flexors|hanging knee raise tutorial"]';

// Parse exercise data
var RAW = JSON.parse(EX_JSON);
var EX = [];
for (var i = 0; i < RAW.length; i++) {
  var p = RAW[i].split('|');
  EX.push({
    id: p[0], name: p[1], muscle: p[2], equipment: p[3],
    instructions: p[4] ? p[4].split('~') : [],
    tips: p[5] ? p[5].split('~') : [],
    primary: p[6] ? p[6].split(',') : [],
    secondary: p[7] ? p[7].split(',') : [],
    ytq: p[8] || (p[1] + ' exercise tutorial')
  });
}

// Build muscle list
var MUSCLES = ['All'];
var _seen = {};
for (var i = 0; i < EX.length; i++) {
  if (!_seen[EX[i].muscle]) { _seen[EX[i].muscle] = 1; MUSCLES.push(EX[i].muscle); }
}

// State
var S = { custom:[], routines:[], sessions:[], records:{} };
var B = { idx:-1, blocks:[] };
var WO = null;
var timerSec = 0, timerInt = null;
var _libMuscle = 'All';
var _toastT = null;

function allEx() { return EX.concat(S.custom); }
function getEx(id) { var a = allEx(); for (var i=0;i<a.length;i++) if(a[i].id===id) return a[i]; return null; }

// Persist / load handled by Supabase - see DB section below

// DOM helpers
function el(id) { return document.getElementById(id); }
function html(id, h) { el(id).innerHTML = h; }
function show(id) { el(id).style.display = ''; }
function hide(id) { el(id).style.display = 'none'; }

// Toast
function toast(m) {
  var t = el('toast'); t.textContent = m; t.classList.add('on');
  clearTimeout(_toastT);
  _toastT = setTimeout(function(){ t.classList.remove('on'); }, 2200);
}

// Pages
function SP(p) {
  var pages = ['lib','rtn','ses','prg'];
  for (var i=0;i<pages.length;i++) {
    el('p-'+pages[i]).classList[pages[i]===p?'add':'remove']('on');
    el('nb-'+pages[i]).classList[pages[i]===p?'add':'remove']('on');
  }
  el('fab').style.display = p==='rtn' ? 'flex' : 'none';
  if (p==='rtn') renderRtn();
  if (p==='ses') renderSes();
  if (p==='prg') renderPrg();
}

// ---- LIBRARY ----
function renderLib() {
  var filter = _libMuscle;
  var tabs = '';
  for (var i=0;i<MUSCLES.length;i++) {
    tabs += '<button class="mt' + (MUSCLES[i]===filter?' on':'') + '" onclick="filterLib(\'' + MUSCLES[i] + '\')">' + MUSCLES[i] + '<\/button>';
  }
  html('mtabs', tabs);

  var list = filter==='All' ? allEx() : allEx().filter(function(e){return e.muscle===filter;});
  var h = '<div class="card" style="display:flex;align-items:center;gap:10px;cursor:pointer" onclick="openCustomModal()">' +
    '<div style="width:34px;height:34px;border-radius:50%;border:.5px dashed var(--ac);display:flex;align-items:center;justify-content:center;font-size:20px;color:var(--ac);flex-shrink:0"><i class="ti ti-plus"><\/i><\/div>' +

function openDetail(id) {
  var ex = getEx(id);
  if (!ex) return;
  el('det-title').textContent = ex.name;
  var ytq = (ex.ytq||ex.name).replace(/\s+/g,'+');
  var ythref = ex.youtubeUrl || ('https://www.youtube.com/results?search_query=' + ytq);
  var steps = '';
  for (var i=0;i<ex.instructions.length;i++) {
    steps += '<div class="srow"><span class="snum">' + (i+1) + '<\/span><span>' + ex.instructions[i] + '<\/span><\/div>';
  }
  var tips = '';
  for (var i=0;i<ex.tips.length;i++) {
    tips += '<div class="trow"><i class="ti ti-bulb"><\/i><span>' + ex.tips[i] + '<\/span><\/div>';
  }
  var isCustom = false;
  for (var i=0;i<S.custom.length;i++) if(S.custom[i].id===id) isCustom=true;
  var h = muscleSVG(ex) +
    '<div class="card" style="margin-bottom:10px">' +
      '<div style="display:flex;gap:16px">' +
        '<div style="flex:1"><span style="font-size:11px;color:var(--tx3);font-weight:700;text-transform:uppercase">Primary<\/span><br><span style="font-size:13px;font-weight:600">' + (ex.primary.join(', ')||'-') + '<\/span><\/div>' +
        '<div style="flex:1"><span style="font-size:11px;color:var(--tx3);font-weight:700;text-transform:uppercase">Secondary<\/span><br><span style="font-size:13px">' + (ex.secondary.join(', ')||'-') + '<\/span><\/div>' +
      '<\/div><\/div>';
  if (steps) h += '<div class="icard"><h3>How to perform<\/h3>' + steps + '<\/div>';
  if (tips)  h += '<div class="icard"><h3>Tips<\/h3>' + tips + '<\/div>';
  h += '<button class="ytbtn" onclick="window.open(\'' + ythref + '\',\'_blank\')">' +
    '<svg width="22" height="16" viewBox="0 0 22 16" fill="none"><path d="M21.5 2.5A2.75 2.75 0 0 0 19.05.08C17.4 0 11 0 11 0S4.6 0 2.95.08A2.75 2.75 0 0 0 .5 2.5C.41 4.16.41 8 .41 8s0 3.84.09 5.5a2.75 2.75 0 0 0 2.45 2.42C4.6 16 11 16 11 16s6.4 0 8.05-.08a2.75 2.75 0 0 0 2.45-2.42c.09-1.66.09-5.5.09-5.5s0-3.84-.09-5.5z" fill="#fff"/><path d="M8.75 11.5v-7l6 3.5-6 3.5z" fill="#FF0000"/><\/svg>' +
    'Watch tutorial on YouTube<\/button>';
  if (isCustom) h += '<button class="btn" style="margin-top:8px;background:var(--er);border-color:var(--er)" onclick="delCustomEx(\'' + id + '\')">Delete exercise<\/button>';
  html('det-body', h);
  el('fs-detail').classList.add('on');
}
function closeDetail() { el('fs-detail').classList.remove('on'); }

// ---- CUSTOM EXERCISE ----
function openCustomModal() {
  var sel = el('cx-muscle');
  var opts = '';
  for (var i=1;i<MUSCLES.length;i++) opts += '<option value="'+MUSCLES[i]+'">'+MUSCLES[i]+'<\/option>';

  el('m-custom').classList.remove('on');

}
function saveCustomEx() {
  var name = el('cx-name').value.trim();
  if (!name) { toast('Enter a name'); return; }
  var muscle = el('cx-muscle').value;
  var equip  = el('cx-equip').value.trim() || 'Custom';
  var instr  = el('cx-instr').value.trim();
  var yt     = el('cx-yt').value.trim();
  var id = 'cx' + Date.now();
  S.custom.push({ id:id, name:name, muscle:muscle, equipment:equip,
    instructions: instr ? instr.split('\n').filter(Boolean) : [],
    tips:[], primary:[muscle], secondary:[], ytq:name+' exercise tutorial', youtubeUrl:yt||null });
  save(); closeCustomModal(); renderLib(); toast('Exercise added!');
}
function delCustomEx(id) {
  if (!confirm('Delete this exercise?')) return;
  S.custom = S.custom.filter(function(e){ return e.id!==id; });
  save(); closeDetail(); renderLib(); toast('Exercise deleted');
}

  var h = '<div class="stitle">Your routines<\/div>';
  for (var i=0;i<S.routines.length;i++) {
    var r=S.routines[i], exCnt=0;
    for (var j=0;j<r.blocks.length;j++) exCnt+=r.blocks[j].exercises?r.blocks[j].exercises.length:0;

      '<\/div><div style="display:flex;gap:6px">' +

function newRoutine() {
  B={idx:-1,blocks:[]};
  el('bname').value='';
  _bMuscle='All';

function editRtn(i) {

// ---- BUILDER ----
var _bMuscle = 'All';
var _cfgEx = null;
var _cfgSets = 3;
var _cfgSSOn = false;
var _cfgPartner = null;
var _cfgBSets = 3;

function getPB(id) { var r=S.records[id]; return (r&&r.maxWeight>0)?r.maxWeight:''; }

// Muscle tabs inside builder
function renderBldTabs() {
  var h='';
  for (var i=0;i<MUSCLES.length;i++) {
    var m=MUSCLES[i];
    h+='<button class="mt'+(m===_bMuscle?' on':'')+'" data-m="'+m+'" onclick="setBldMuscle(this.dataset.m)">'+m+'<\/button>';
  }
  html('bld-tabs', h);
}
function setBldMuscle(m) { _bMuscle=m; renderBldTabs(); renderBldList(); }

// Exercise list inside builder
function renderBldList() {
  var q=(el('bld-search').value||'').toLowerCase();
  var list=allEx().filter(function(e){
    var muscleOk=_bMuscle==='All'||e.muscle===_bMuscle;
    var searchOk=!q||e.name.toLowerCase().indexOf(q)>=0||e.muscle.toLowerCase().indexOf(q)>=0;
    return muscleOk&&searchOk;
  });
  // which IDs are already in blocks
  var addedIds={};
  for (var bi=0;bi<B.blocks.length;bi++) {
    var blk=B.blocks[bi];
    for (var ei=0;ei<blk.exercises.length;ei++) addedIds[blk.exercises[ei].id]=true;
  }
  var h='';
  for (var i=0;i<list.length;i++) {
    var ex=list[i];
    var isAdded=!!addedIds[ex.id];
    var pb=getPB(ex.id);
    var pbBadge=pb?'<span style="font-size:10px;color:var(--ac);background:var(--acl);padding:1px 6px;border-radius:6px;font-weight:600">PR '+pb+'kg<\/span>':'';
    h+='<div class="bld-ex'+(isAdded?' added':'')+'" data-id="'+ex.id+'" onclick="openCfg(this.dataset.id)">' +
      '<div style="flex:1;min-width:0">' +
        '<div style="font-size:14px;font-weight:600;display:flex;align-items:center;gap:6px">'+ex.name+' '+pbBadge+'<\/div>' +
        '<div style="font-size:12px;color:var(--tx3);margin-top:2px">'+ex.muscle+' &middot; '+ex.equipment+'<\/div>' +
      '<\/div>' +
      '<i class="ti ti-'+(isAdded?'check':'plus')+'" style="color:'+(isAdded?'var(--ok)':'var(--ac)')+';font-size:20px;flex-shrink:0"><\/i>' +
    '<\/div>';
  }
  html('bld-list', h||'<div style="padding:20px;text-align:center;font-size:13px;color:var(--tx3)">No exercises found<\/div>');
}

// Routine blocks panel
function renderBldBlocks() {
  var cnt=0;
  for (var bi=0;bi<B.blocks.length;bi++) cnt+=B.blocks[bi].exercises.length;
  el('bld-count').textContent=cnt>0?(cnt+' exercise'+(cnt!==1?'s':'')):'';

  if (!B.blocks||B.blocks.length===0) {
    html('bld-blocks','<div id="bld-bempty" style="padding:16px;text-align:center;font-size:13px;color:var(--tx3)">Tap an exercise above to add it<\/div>');
    return;
  }
  var h='';
  for (var bi=0;bi<B.blocks.length;bi++) {
    var blk=B.blocks[bi];
    var isSS=blk.type==='superset';
    h+='<div class="bld-block'+(isSS?' ss':'')+'">';
    if (isSS) {
      h+='<div class="bld-block-row"><span class="sslbl" style="margin-bottom:0"><i class="ti ti-layers-intersect"><\/i> Superset<\/span><button class="bld-rmv" onclick="removeBlock('+bi+')"><i class="ti ti-trash"><\/i><\/button><\/div>';
    }
    for (var ei=0;ei<blk.exercises.length;ei++) {
      var ex=blk.exercises[ei];
      h+='<div style="'+(isSS&&ei>0?'margin-top:8px;padding-top:8px;border-top:.5px solid rgba(124,58,237,.25)':'')+'">';
      if (!isSS) {
        h+='<div class="bld-block-row"><span class="bld-block-name">'+ex.name+'<\/span><button class="bld-rmv" onclick="removeBlock('+bi+')"><i class="ti ti-trash"><\/i><\/button><\/div>';
      } else {
        h+='<div style="font-size:12px;font-weight:600;color:var(--ss);margin-bottom:4px">'+String.fromCharCode(65+ei)+'. '+ex.name+'<\/div>';
      }
      h+='<div style="display:flex;align-items:center;gap:8px;flex-wrap:wrap">' +
        '<span style="font-size:12px;color:var(--tx3)">'+(ex.sets||3)+' sets<\/span>' +
        '<span style="font-size:12px;color:var(--tx3)">&middot; '+(ex.reps||'?')+' reps<\/span>' +
        '<span style="font-size:12px;color:var(--tx3)">&middot; '+(ex.weight||0)+'kg<\/span>' +
      '<\/div><\/div>';
    }
    h+='<\/div>';
  }
  html('bld-blocks', h);
}

function removeBlock(bi) {
  B.blocks.splice(bi,1);
  renderBldList(); renderBldBlocks();
}

function saveRoutine() {
  var name=el('bname').value.trim();
  if(!name){toast('Give your routine a name');return;}
  if(!B.blocks||B.blocks.length===0){toast('Add at least one exercise');return;}
  var r={name:name,blocks:JSON.parse(JSON.stringify(B.blocks))};
  if(B.idx>=0) S.routines[B.idx]=r; else S.routines.push(r);

// ---- WORKOUT ----
function startWO(ri) {
  var r=S.routines[ri];
  WO={name:r.name,blocks:[]};
  for(var bi=0;bi<r.blocks.length;bi++){
    var sb=r.blocks[bi];
    var nb={type:sb.type,exercises:[]};
    for(var ei=0;ei<sb.exercises.length;ei++){
      var se=sb.exercises[ei];
      var numS=se.sets||3;
      var sets=[];
      for(var si=0;si<numS;si++) sets.push({reps:se.reps||'',weight:se.weight||'',done:false});
      nb.exercises.push({id:se.id,name:se.name,sets:sets});
    }
    WO.blocks.push(nb);
  }
  timerSec=0; clearInterval(timerInt);
  timerInt=setInterval(function(){
    timerSec++;
    var m=Math.floor(timerSec/60),s=timerSec%60;
    var t=el('wo-timer'); if(t) t.textContent=m+':'+(s<10?'0':'')+s;
  },1000);
  renderWO(); el('fs-workout').classList.add('on');
}
function renderWO() {
  el('wo-title').textContent=WO.name;
  var h='';
  for(var bi=0;bi<WO.blocks.length;bi++){
    var blk=WO.blocks[bi];
    if(blk.type==='superset'){
      h+='<div style="border:1.5px solid var(--ss);border-radius:var(--rl);padding:12px 14px;margin-bottom:10px;background:var(--sf)">' +
        '<span class="sslbl" style="margin-bottom:10px"><i class="ti ti-layers-intersect"><\/i> Superset<\/span>';
      for(var ei=0;ei<blk.exercises.length;ei++){
        if(ei>0) h+='<div class="dvd"><\/div>';
        h+=renderLiveEx(blk.exercises[ei],bi,ei,true);
      }
      h+='<\/div>';
    } else {
      h+='<div class="card" style="margin-bottom:10px">'+renderLiveEx(blk.exercises[0],bi,0,false)+'<\/div>';
    }
  }
  html('wo-body',h);
}
function renderLiveEx(ex,bi,ei,isSS){
  var rec=S.records[ex.id];
  var pr=rec&&rec.maxWeight>0?'<span class="prbadge"><i class="ti ti-trophy"><\/i> PR '+rec.maxWeight+'kg<\/span>':'';
  var h='<div>';
  h+='<div style="font-size:14px;font-weight:700;margin-bottom:8px">'+(isSS?String.fromCharCode(65+ei)+'. ':'')+ex.name+pr+'<\/div>';
  h+='<div class="lrow" style="margin-bottom:4px"><span><\/span><span style="font-size:10px;color:var(--tx3);text-align:center;font-weight:700">REPS<\/span><span><\/span><span style="font-size:10px;color:var(--tx3);text-align:center;font-weight:700">KG<\/span><span><\/span><span><\/span><\/div>';
  for(var si=0;si<ex.sets.length;si++){
    var s=ex.sets[si];
    h+='<div class="lrow">' +
      '<span style="font-size:12px;color:var(--tx3)">'+(si+1)+'<\/span>' +
      '<input class="linput" type="number" inputmode="decimal" value="'+s.reps+'" onchange="updateWO('+bi+','+ei+','+si+',\'reps\',this.value)"/>' +
      '<span><\/span>' +
      '<input class="linput" type="number" inputmode="decimal" value="'+s.weight+'" onchange="updateWO('+bi+','+ei+','+si+',\'weight\',this.value)"/>' +
      '<span><\/span>' +
      '<button class="cbtn'+(s.done?' on':'')+'" onclick="toggleDone('+bi+','+ei+','+si+')"><i class="ti ti-check"><\/i><\/button>' +
    '<\/div>';
  }
  h+='<\/div>'; return h;
}
function updateWO(bi,ei,si,f,v){if(WO&&WO.blocks[bi]&&WO.blocks[bi].exercises[ei])WO.blocks[bi].exercises[ei].sets[si][f]=v;}
function toggleDone(bi,ei,si){if(WO&&WO.blocks[bi]&&WO.blocks[bi].exercises[ei]){WO.blocks[bi].exercises[ei].sets[si].done=!WO.blocks[bi].exercises[ei].sets[si].done;renderWO();}}
function closeWorkout(){if(!confirm('Discard this workout?'))return;clearInterval(timerInt);WO=null;el('fs-workout').classList.remove('on');}
function finishWorkout(){
  if(!WO)return;
  clearInterval(timerInt);
  var allEx=[];
  for(var bi=0;bi<WO.blocks.length;bi++) for(var ei=0;ei<WO.blocks[bi].exercises.length;ei++) allEx.push(WO.blocks[bi].exercises[ei]);
  var ses={date:new Date().toISOString(),name:WO.name,durMins:Math.round(timerSec/60),
    exercises:allEx.map(function(ex){return{id:ex.id,name:ex.name,sets:ex.sets.filter(function(s){return s.reps||s.weight;}).map(function(s){return{reps:parseInt(s.reps)||0,weight:parseFloat(s.weight)||0};})};}).filter(function(ex){return ex.sets.length>0;})};
  S.sessions.unshift(ses);
  ses.exercises.forEach(function(ex){
    var mw=0,mr=0;
    for(var i=0;i<ex.sets.length;i++){if(ex.sets[i].weight>mw)mw=ex.sets[i].weight;if(ex.sets[i].reps>mr)mr=ex.sets[i].reps;}
    if(!S.records[ex.id])S.records[ex.id]={maxWeight:0,maxReps:0,history:[],firstWeight:null};
    if(S.records[ex.id].firstWeight===null&&mw>0)S.records[ex.id].firstWeight=mw;
    if(mw>S.records[ex.id].maxWeight)S.records[ex.id].maxWeight=mw;
    if(mr>S.records[ex.id].maxReps)S.records[ex.id].maxReps=mr;
    S.records[ex.id].history.push({date:ses.date,maxWeight:mw,maxReps:mr});
  });
  save(); WO=null; el('fs-workout').classList.remove('on'); SP('ses'); toast('Workout saved!');
}

// ---- PROGRESS ----
function renderPrg(){
  var ids=Object.keys(S.records);
  if(ids.length===0){html('prglist','');show('prg-empty');return;}
  hide('prg-empty');
  var h='';
  for(var k=0;k<ids.length;k++){
    var id=ids[k],rec=S.records[id];
    var ex=getEx(id);
    var name=ex?ex.name:id;
    var hist=(rec.history||[]).slice(-8);
    var maxW=1; for(var i=0;i<hist.length;i++) if(hist[i].maxWeight>maxW) maxW=hist[i].maxWeight;
    var latW=hist.length>0?hist[hist.length-1].maxWeight:0;
    var firW=rec.firstWeight||(hist.length>0?hist[0].maxWeight:0);
    var dk=Math.round((latW-firW)*10)/10;
    var dp=firW>0?Math.round((dk/firW)*100):0;
    var dh=firW>0&&hist.length>1?'<span class="pdelta '+(dk>=0?'up':'dn')+'">'+(dk>=0?'+':'')+dk+'kg ('+(dk>=0?'+':'')+dp+'%)<\/span>':'';
    h+='<div class="card" style="margin-bottom:8px">' +
      '<div style="font-size:14px;font-weight:700;margin-bottom:4px">'+name+'<\/div>' +
      '<div style="font-size:13px;color:var(--tx3);margin-bottom:8px;display:flex;flex-wrap:wrap;gap:6px;align-items:center">' +
        '<span>Latest: <strong style="color:var(--tx)">'+latW+'kg<\/strong><\/span>' +
        '<span>&middot;<\/span>' +
        '<span>PR: <strong style="color:var(--tx)">'+rec.maxWeight+'kg<\/strong> x '+rec.maxReps+' reps<\/span>'+dh+
      '<\/div>';
    if(hist.length<2){h+='<p style="font-size:12px;color:var(--tx3)">Log more sessions to see your progression<\/p>';}
    else{for(var i=0;i<hist.length;i++){var hh=hist[i];var isl=i===hist.length-1;var dn=new Date(hh.date).toLocaleDateString('nl-NL',{day:'numeric',month:'short'});h+='<div class="prow"><span class="pdate">'+dn+'<\/span><div class="pbw"><div class="pb" style="width:'+Math.round(hh.maxWeight/maxW*100)+'%;'+(isl?'background:var(--ok)':'')+'"><\/div><\/div><span class="pval" style="'+(isl?'color:var(--ok)':'')+'">'+hh.maxWeight+'kg<\/span><\/div>';}}
    h+='<\/div>';
  }
  html('prglist',h);
}

function loadFromDB() {
  S = { custom:[], routines:[], sessions:[], records:{} };
  var uid = CURRENT_USER.id;
  var done = 0;
  function check() { done++; if (done===4) { renderLib(); renderRtn(); } }

  // custom exercises
  sb.from('custom_exercises').select('data').eq('user_id', uid).then(function(r) {
    if (r.data) S.custom = r.data.map(function(row){ return row.data; });
    check();
  });

  // routines
  sb.from('routines').select('id,name,blocks').eq('user_id', uid).order('created_at').then(function(r) {
    if (r.data) S.routines = r.data.map(function(row){ return { _id:row.id, name:row.name, blocks:row.blocks }; });
    check();
  });

  // sessions
  sb.from('sessions').select('id,routine_name,dur_mins,exercises,logged_at').eq('user_id', uid).order('logged_at', {ascending:false}).limit(50).then(function(r) {
    if (r.data) S.sessions = r.data.map(function(row){
      return { _id:row.id, name:row.routine_name, durMins:row.dur_mins, exercises:row.exercises, date:row.logged_at };
    });
    check();
  });

  // records
  sb.from('records').select('exercise_id,max_weight,max_reps,first_weight,history').eq('user_id', uid).then(function(r) {
    if (r.data) r.data.forEach(function(row){
      S.records[row.exercise_id] = { maxWeight:row.max_weight, maxReps:row.max_reps, firstWeight:row.first_weight, history:row.history||[] };
    });
    check();
  });
}

    var r = { name:name, blocks:JSON.parse(JSON.stringify(B.blocks)) };
    S.routines.push(r);
    dbSaveRoutine(r);
    toast('Routine saved!');
  }
  closeBuilder(); SP('rtn');
}

function delRtn(i) {
  if (!confirm('Delete "' + S.routines[i].name + '"?')) return;
  dbDeleteRoutine(S.routines[i]);
  S.routines.splice(i, 1);
  renderRtn(); toast('Routine deleted');
}

// Override finishWorkout to write session + records to DB
function finishWorkout() {
  if (!WO) return;
  clearInterval(timerInt);
  var allExArr = [];
  for (var bi=0;bi<WO.blocks.length;bi++)
    for (var ei=0;ei<WO.blocks[bi].exercises.length;ei++)
      allExArr.push(WO.blocks[bi].exercises[ei]);

  var ses = { date:new Date().toISOString(), name:WO.name, durMins:Math.round(timerSec/60),
    exercises: allExArr.map(function(ex){
      return { id:ex.id, name:ex.name,
        sets: ex.sets.filter(function(s){return s.reps||s.weight;}).map(function(s){return {reps:parseInt(s.reps)||0, weight:parseFloat(s.weight)||0};}) };
    }).filter(function(ex){return ex.sets.length>0;})
  };

  S.sessions.unshift(ses);
  dbSaveSession(ses);

  ses.exercises.forEach(function(ex) {
    var mw=0, mr=0;
    for (var i=0;i<ex.sets.length;i++) {
      if(ex.sets[i].weight>mw) mw=ex.sets[i].weight;
      if(ex.sets[i].reps>mr)   mr=ex.sets[i].reps;
    }
    if (!S.records[ex.id]) S.records[ex.id] = { maxWeight:0, maxReps:0, firstWeight:null, history:[] };
    if (S.records[ex.id].firstWeight===null && mw>0) S.records[ex.id].firstWeight=mw;
    if (mw > S.records[ex.id].maxWeight) S.records[ex.id].maxWeight=mw;
    if (mr > S.records[ex.id].maxReps)   S.records[ex.id].maxReps=mr;
    S.records[ex.id].history.push({ date:ses.date, maxWeight:mw, maxReps:mr });
    dbUpsertRecord(ex.id, S.records[ex.id]);
  });

  WO = null;
  el('fs-workout').classList.remove('on');
  SP('ses'); toast('Workout saved!');
}

window.onload = function() {
  // App hidden until auth confirmed
  el('app').style.display = 'none';

  ['m-custom','m-cfg'].forEach(function(id){
    el(id).addEventListener('click',function(e){if(e.target===this)this.classList.remove('on');});
  });

  // Enter key on password field submits
  el('auth-password').addEventListener('keydown', function(e){ if(e.key==='Enter') submitAuth(); });

  // Listen for auth state changes
  sb.auth.onAuthStateChange(function(event, session) {
    if (session && session.user) {
      showApp(session.user);
    } else {
      showLogin();
    }
  });
};
